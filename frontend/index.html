<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Online — Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/main.css" />
</head>
  <body>
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>
    <header class="site-header" id="site-header"></header>

    <main>
      <!-- HERO -->
      <section class="hero">
        <h1>Гонки<br /><span>Скорость</span><br />Победа</h1>
      </section>

      <!-- HOME NEWS -->
      <section class="races-section" style="padding-top: 0; padding-bottom: 1rem">
        <div class="section-header">
          <span class="section-title">Последние новости</span>
          <a class="nav-btn" href="/news" style="font-size: 12px; padding: 4px 12px; text-decoration: none; display: inline-block;">Все новости →</a>
        </div>
        <div id="home-news-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
          <div class="skeleton" style="height: 200px; border-radius: 12px"></div>
        </div>
      </section>

      <!-- ADMIN PANEL -->
      <section class="admin-panel" id="admin-panel">
        <div class="section-header">
          <span class="section-title">Панель администратора</span>
        </div>
        <div class="admin-grid">
          <div class="admin-stat">
            <div class="admin-stat-label">Всего гонок</div>
            <div class="admin-stat-val" id="admin-stat-total">—</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-label">Регистрация</div>
            <div class="admin-stat-val green" id="admin-stat-open">—</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-label">Участников</div>
            <div class="admin-stat-val" id="admin-stat-users">—</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-label">Завершено</div>
            <div class="admin-stat-val red" id="admin-stat-finished">—</div>
          </div>
        </div>
        <div class="section-header">
          <span class="section-title">Управление гонками</span>
        </div>
        <div style="overflow-x: auto">
          <table class="admin-table" id="admin-races-table">
            <thead>
              <tr>
                <th>ID</th><th>Название</th><th>Тип</th><th>Дата</th>
                <th>Статус</th><th>Участники</th><th>Действия</th>
              </tr>
            </thead>
            <tbody id="admin-races-tbody">
              <tr><td colspan="7" style="text-align: center; color: var(--text3)">Загрузка...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <button class="filter-chip" data-filter="all">Все гонки</button>
        <button class="filter-chip active" data-filter="Регистрация">Регистрация</button>
        <button class="filter-chip" data-filter="Завершена">Результаты</button>
      </div>

      <!-- RACES GRID -->
      <section class="races-section">
        <div class="section-header">
          <span class="section-title">Гонки</span>
          <span class="section-count" id="races-count">Загрузка...</span>
        </div>
        <div class="races-grid" id="races-grid">
          <div class="empty-state">
            <div class="skeleton" style="height: 200px"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- CREATE RACE MODAL -->
    <div class="modal-overlay" id="modal-create">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Создать гонку</div>
          <button class="modal-close" onclick="closeModal('modal-create')">✕</button>
        </div>
        <div class="modal-body">
          <form id="form-create" onsubmit="handleCreateRace(event)">
            <div class="form-group">
              <label class="form-label">Название гонки</label>
              <input class="form-input" type="text" name="name" placeholder="Гран-При Москвы" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Тип трассы</label>
                <input class="form-input" type="text" name="race" placeholder="Городская трасса" required />
              </div>
              <div class="form-group">
                <label class="form-label">Макс. участников</label>
                <input class="form-input" type="number" name="maxuser" value="20" min="2" max="100" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Дата и время</label>
                <input class="form-input" type="datetime-local" name="time" required />
              </div>
              <div class="form-group">
                <label class="form-label">Статус</label>
                <select class="form-input" name="status">
                  <option value="Регистрация">Регистрация</option>
                  <option value="Завершена">Завершена</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Описание</label>
              <textarea class="form-input" rows="3" name="about" placeholder="Расскажите о гонке..."></textarea>
            </div>
            <div class="form-error" id="error-create-race"></div>
            <div style="display: flex; gap: 10px; margin-top: 0.5rem">
              <button type="submit" class="btn btn-red" id="btn-submit-create">Создать</button>
              <button type="button" class="btn btn-ghost" onclick="closeModal('modal-create')">Отмена</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- EDIT RACE MODAL -->
    <div class="modal-overlay" id="modal-edit">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Редактировать гонку</div>
          <button class="modal-close" onclick="closeModal('modal-edit')">✕</button>
        </div>
        <div class="modal-body">
          <form id="form-edit" onsubmit="handleEditRace(event)">
            <input type="hidden" name="race_id" id="edit-race-id" />
            <div class="form-group">
              <label class="form-label">Название гонки</label>
              <input class="form-input" type="text" name="name" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Тип трассы</label>
                <input class="form-input" type="text" name="race" required />
              </div>
              <div class="form-group">
                <label class="form-label">Макс. участников</label>
                <input class="form-input" type="number" name="maxuser" min="2" max="100" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Дата и время</label>
                <input class="form-input" type="datetime-local" name="time" required />
              </div>
              <div class="form-group">
                <label class="form-label">Статус</label>
                <select class="form-input" name="status">
                  <option value="Регистрация">Регистрация</option>
                  <option value="Завершена">Завершена</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Описание</label>
              <textarea class="form-input" rows="3" name="about"></textarea>
            </div>
            <div class="form-error" id="error-edit-race"></div>
            <div style="display: flex; gap: 10px; margin-top: 0.5rem">
              <button type="submit" class="btn btn-red" id="btn-submit-edit">Сохранить</button>
              <button type="button" class="btn btn-ghost" onclick="closeModal('modal-edit')">Отмена</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- SET RESULTS MODAL -->
    <div class="modal-overlay" id="modal-results">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Установить результаты</div>
          <button class="modal-close" onclick="closeModal('modal-results')">✕</button>
        </div>
        <div class="modal-body">
          <div id="results-form-container"></div>
          <div style="display: flex; gap: 10px; margin-top: 1rem">
            <button class="btn btn-red" onclick="saveResults()">Сохранить</button>
            <button class="btn btn-ghost" onclick="closeModal('modal-results')">Отмена</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/shared.js"></script>
    <script>
      let races = [];
      let registrations = new Set();
      let currentFilter = "Регистрация";
      let editingRace = null;

      async function init() {
        renderHeader("home");
        injectAuthModal();
        injectToast();
        await initAuth();

        const params = new URLSearchParams(window.location.search);
        if (params.get("action") === "create") openModal("modal-create");
        if (params.get("action") === "admin")
          document.getElementById("admin-panel").classList.add("visible");

        await loadRaces();
        await loadHomeNews();
        document.getElementById("loading-overlay").classList.add("hidden");
      }

      document.querySelectorAll(".filter-chip").forEach((chip) => {
        chip.addEventListener("click", (e) => {
          document.querySelectorAll(".filter-chip").forEach((c) => c.classList.remove("active"));
          e.target.classList.add("active");
          currentFilter = e.target.dataset.filter;
          renderRaces();
        });
      });

      async function loadRaces() {
        try {
          races = await api.getRaces();
          if (currentUser) await loadUserRegistrations();
          renderRaces();
          updateAdminStats();
          renderAdminTable();
        } catch (e) {
          showToast(e.message, true);
        }
      }

      // Запрашиваем участников только для гонок со статусом "Регистрация"
      // (только они показывают кнопку "Участвовать"/"Выйти")
      // Все запросы — параллельно через Promise.all
      async function loadUserRegistrations() {
        registrations.clear();

        const openRaces = races.filter((r) => r.status === "Регистрация");
        if (!openRaces.length) return;

        const results = await Promise.all(
          openRaces.map((race) =>
            api.getRaceParticipants(race.id).catch(() => [])
          )
        );

        results.forEach((participants, i) => {
          if (participants.some((p) => p.user_id === currentUser.id)) {
            registrations.add(openRaces[i].id);
          }
        });
      }

      async function loadHomeNews() {
        try {
          const news = await api.getNews();
          const grid = document.getElementById("home-news-grid");
          const latest = news.slice(0, 3);
          if (!latest.length) {
            grid.innerHTML =
              '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📰</div><p>Пока нет новостей</p></div>';
            return;
          }
          grid.innerHTML = latest
            .map(
              (n) => `
              <a href="/news/${n.id}" class="news-card" style="text-decoration:none;">
                <div class="news-card-image" style="height:140px;">
                  ${
                    n.image_url
                      ? `<img src="${n.image_url}" alt="${n.title}" onerror="this.parentElement.innerHTML='<div class=\\'news-card-image-placeholder\\'>📰</div>'">`
                      : '<div class="news-card-image-placeholder">📰</div>'
                  }
                </div>
                <div class="news-card-content" style="padding:1rem;">
                  <div class="news-card-date" style="font-size:10px;">📅 ${formatDate(n.created_at)}</div>
                  <h3 class="news-card-title" style="font-size:16px;margin-bottom:.5rem;">${n.title}</h3>
                  <p class="news-card-summary" style="font-size:12px;-webkit-line-clamp:2;">${n.summary || n.content.substring(0, 120)}...</p>
                </div>
              </a>`
            )
            .join("");
        } catch (e) {}
      }

      function renderRaces() {
        const grid = document.getElementById("races-grid");
        const filtered =
          currentFilter === "all"
            ? races
            : races.filter((r) => r.status === currentFilter);
        document.getElementById("races-count").textContent = `${
          filtered.length
        } ${pluralize(filtered.length, "гонка", "гонки", "гонок")}`;
        if (!filtered.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🏁</div>Нет гонок</div>`;
          return;
        }

        grid.innerHTML = filtered
          .map((race) => {
            const pct = Math.round((race.users / race.maxuser) * 100);
            const fillClass = pct >= 100 ? "full" : pct >= 75 ? "warn" : "";
            const isRegistered = registrations.has(race.id);
            const canEdit = canEditRace(race);

            return `
            <div class="race-card" onclick="window.location.href='/races/${race.id}'">
              <div class="race-card-top">
                <div class="race-type">${race.race}</div>
                <span class="status-badge ${getStatusClass(race.status)}">${race.status}</span>
              </div>
              <h2>${race.name}</h2>
              <div class="race-card-meta">
                <span>📅 ${formatDate(race.time)}</span>
                ${race.creator_email ? `<span>👤 ${race.creator_email}</span>` : ""}
                ${race.organizer_likes > 0 ? `<span style="color:var(--green)">👍 ${race.organizer_likes}</span>` : ""}
                ${race.organizer_dislikes > 0 ? `<span style="color:var(--red)">👎 ${race.organizer_dislikes}</span>` : ""}
              </div>
              <div class="race-card-footer">
                <div class="capacity-bar-wrap">
                  <div class="capacity-label"><span>Места</span><span>${race.users} / ${race.maxuser}</span></div>
                  <div class="capacity-bar"><div class="capacity-fill ${fillClass}" style="width:${pct}%"></div></div>
                </div>
                <div style="display:flex;gap:8px;">
                  ${canEdit ? `<button class="register-btn" onclick="event.stopPropagation();openEditModal(${race.id})" title="Редактировать">✎</button>` : ""}
                  ${race.status === "Завершена" && canEdit ? `<button class="register-btn" onclick="event.stopPropagation();openResultsModal(${race.id})" title="Результаты">🏆</button>` : ""}
                  ${race.status === "Регистрация" ? `
                    <button class="register-btn ${isRegistered ? "registered" : ""}"
                      onclick="event.stopPropagation();toggleRegistration(${race.id})"
                      ${!isRegistered && race.users >= race.maxuser ? "disabled" : ""}>
                      ${isRegistered ? "Выйти" : "Участвовать"}
                    </button>` : ""}
                </div>
              </div>
            </div>`;
          })
          .join("");
      }

      function canEditRace(race) {
        if (!currentUser) return false;
        if (currentUser.is_superuser) return true;
        if (currentUser.is_verified && race && race.created_by === currentUser.id) return true;
        return false;
      }

      async function toggleRegistration(raceId) {
        if (!currentUser) { openAuthModal("login"); return; }
        try {
          if (registrations.has(raceId)) {
            await api.unregisterFromRace(raceId);
            registrations.delete(raceId);
            showToast("Регистрация отменена");
          } else {
            await api.registerForRace(raceId);
            registrations.add(raceId);
            showToast("Вы зарегистрированы на гонку!");
          }
          await loadRaces();
        } catch (e) {
          showToast(e.message, true);
        }
      }

      async function openEditModal(raceId) {
        try {
          const race = await api.getRace(raceId);
          editingRace = race;
          document.getElementById("edit-race-id").value = race.id;
          const form = document.getElementById("form-edit");
          form.name.value = race.name;
          form.race.value = race.race;
          form.maxuser.value = race.maxuser;
          form.about.value = race.about || "";
          form.status.value = race.status;
          const d = new Date(race.time);
          d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
          form.time.value = d.toISOString().slice(0, 16);
          openModal("modal-edit");
        } catch (e) {
          showToast(e.message, true);
        }
      }

      async function handleCreateRace(e) {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById("btn-submit-create");
        btn.disabled = true;
        try {
          await api.createRace({
            name: form.name.value,
            race: form.race.value,
            about: form.about.value,
            time: form.time.value,
            maxuser: parseInt(form.maxuser.value),
            status: form.status.value,
          });
          closeModal("modal-create");
          showToast("Гонка создана!");
          await loadRaces();
          form.reset();
        } catch (e) {
          const el = document.getElementById("error-create-race");
          el.textContent = e.message;
          el.classList.add("visible");
        } finally {
          btn.disabled = false;
        }
      }

      async function handleEditRace(e) {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById("btn-submit-edit");
        btn.disabled = true;
        try {
          await api.updateRace(editingRace.id, {
            name: form.name.value,
            race: form.race.value,
            about: form.about.value,
            time: form.time.value,
            maxuser: parseInt(form.maxuser.value),
            status: form.status.value,
          });
          closeModal("modal-edit");
          showToast("Гонка обновлена!");
          await loadRaces();
          editingRace = null;
        } catch (e) {
          const el = document.getElementById("error-edit-race");
          el.textContent = e.message;
          el.classList.add("visible");
        } finally {
          btn.disabled = false;
        }
      }

      async function openResultsModal(raceId) {
        try {
          const participants = await api.getRaceParticipants(raceId);
          window._resultsRaceId = raceId;
          let html =
            participants.length === 0
              ? '<p style="color:var(--text3);text-align:center;padding:2rem;">Нет зарегистрированных участников</p>'
              : '<div style="display:flex;flex-direction:column;gap:10px;">' +
                participants
                  .map(
                    (p) => `
                    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
                      <div style="flex:1;font-size:14px;">${p.username}</div>
                      <select class="form-input" style="width:100px;text-align:center;" data-user-id="${p.user_id}">
  <option value="">—</option>
  ${Array.from({length:20},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}
<option value="21">DNS</option>
<option value="22">DSK</option>
</select>
                    </div>`
                  )
                  .join("") +
                "</div>";
          document.getElementById("results-form-container").innerHTML = html;
          openModal("modal-results");
        } catch (e) {
          showToast(e.message, true);
        }
      }

      async function saveResults() {
        const inputs = document.querySelectorAll("#results-form-container select[data-user-id]");
        const results = [];
        const positions = new Set();
        for (const input of inputs) {
          const userId = parseInt(input.dataset.userId);
          const position = input.value !== "" ? parseInt(input.value) : null;
          if (position !== null && !isNaN(position)) {
            if (position > 0 && positions.has(position)) { showToast("Позиции должны быть уникальными", true); return; }
            positions.add(position);
            results.push({ user_id: userId, position });
          }
        }
        if (!results.length) { showToast("Укажите хотя бы один результат", true); return; }
        try {
          await api.setRaceResults(window._resultsRaceId, results);
          closeModal("modal-results");
          showToast("Результаты сохранены!");
          await loadRaces();
        } catch (e) {
          showToast(e.message, true);
        }
      }

      function updateAdminStats() {
        if (!currentUser?.is_superuser) return;
        document.getElementById("admin-stat-total").textContent = races.length;
        document.getElementById("admin-stat-open").textContent = races.filter((r) => r.status === "Регистрация").length;
        document.getElementById("admin-stat-users").textContent = races.reduce((s, r) => s + r.users, 0);
        document.getElementById("admin-stat-finished").textContent = races.filter((r) => r.status === "Завершена").length;
      }

      function renderAdminTable() {
        if (!currentUser?.is_superuser) return;
        const tbody = document.getElementById("admin-races-tbody");
        if (!races.length) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text3);">Нет гонок</td></tr>';
          return;
        }
        tbody.innerHTML = races
          .map(
            (race) => `
            <tr>
              <td>${race.id}</td><td>${race.name}</td><td>${race.race}</td>
              <td>${formatDate(race.time)}</td>
              <td><span class="status-badge ${getStatusClass(race.status)}">${race.status}</span></td>
              <td>${race.users} / ${race.maxuser}</td>
              <td><div class="admin-actions-cell">
                <button class="admin-btn edit" onclick="openEditModal(${race.id})">Редактировать</button>
                ${race.status === "Завершена" ? `<button class="admin-btn" onclick="openResultsModal(${race.id})">Результаты</button>` : ""}
              </div></td>
            </tr>`
          )
          .join("");
      }

      function onLoginSuccess() { loadRaces(); }

      init();
    </script>
  </body>
</html>
