<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Гонка — F1 Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/main.css" />
    <style>
      /* ── HERO ─────────────────────────────── */
      .rd-hero {
        position: relative;
        min-height: 420px;
        display: flex;
        align-items: flex-end;
        overflow: hidden;
        padding: 0;
      }
      .rd-hero-bg {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
            -55deg,
            transparent,
            transparent 28px,
            rgba(225, 6, 0, 0.045) 28px,
            rgba(225, 6, 0, 0.045) 29px
          ),
          linear-gradient(160deg, #0e0e12 0%, #18080a 60%, #0a0a0a 100%);
        z-index: 0;
      }
      .rd-hero-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 65% 40%,
          rgba(225, 6, 0, 0.18) 0%,
          transparent 70%
        );
      }
      /* tyre marks SVG pattern */
      .rd-hero-marks {
        position: absolute;
        right: -40px;
        top: 0;
        bottom: 0;
        width: 480px;
        opacity: 0.07;
        background: repeating-linear-gradient(
            90deg,
            transparent,
            transparent 4px,
            #fff 4px,
            #fff 8px
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 60px,
            #fff 60px,
            #fff 62px
          );
      }
      .rd-hero-content {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
        padding: 3rem 2rem 2.5rem;
      }
      .rd-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 2.5rem;
        transition: color 0.2s;
      }
      .rd-back:hover {
        color: rgba(255, 255, 255, 0.8);
      }
      .rd-race-type {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--red);
        border: 1px solid rgba(225, 6, 0, 0.4);
        border-radius: 3px;
        padding: 4px 10px;
        margin-bottom: 1rem;
      }
      .rd-title {
        font-family: var(--font-display);
        font-size: clamp(48px, 8vw, 96px);
        letter-spacing: 3px;
        line-height: 0.9;
        margin-bottom: 1.5rem;
        text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
      }
      .rd-hero-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .rd-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.65);
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 5px 12px;
        backdrop-filter: blur(6px);
      }
      .rd-chip.green {
        color: var(--green);
        border-color: rgba(0, 200, 83, 0.3);
        background: rgba(0, 200, 83, 0.08);
      }
      .rd-chip.yellow {
        color: var(--yellow, #ffc107);
        border-color: rgba(255, 193, 7, 0.3);
        background: rgba(255, 193, 7, 0.08);
      }

      /* ── LAYOUT ───────────────────────────── */
      .rd-body {
        max-width: 960px;
        margin: 0 auto;
        padding: 2.5rem 2rem;
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 2rem;
        align-items: start;
      }
      @media (max-width: 768px) {
        .rd-body {
          grid-template-columns: 1fr;
          padding: 1.5rem 1rem;
        }
      }

      /* ── CARDS ────────────────────────────── */
      .rd-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 1.25rem;
      }
      .rd-card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text3);
      }
      .rd-card-head-icon {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      .rd-card-body {
        padding: 1.25rem;
      }

      /* capacity */
      .cap-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }
      .cap-label {
        font-size: 12px;
        color: var(--text3);
      }
      .cap-num {
        font-family: var(--font-display);
        font-size: 22px;
      }
      .cap-track {
        height: 6px;
        background: var(--surface2, rgba(255, 255, 255, 0.07));
        border-radius: 99px;
        overflow: hidden;
      }
      .cap-fill {
        height: 100%;
        border-radius: 99px;
        background: var(--green);
        transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .cap-fill.warn {
        background: var(--yellow, #ffc107);
      }
      .cap-fill.full {
        background: var(--red);
      }

      /* about */
      .rd-about {
        font-size: 14px;
        line-height: 1.85;
        color: var(--text2);
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      /* participants */
      .part-grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .part-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        background: var(--surface2, rgba(255, 255, 255, 0.04));
        font-size: 13px;
        color: var(--text2);
        text-decoration: none;
        transition: background 0.15s;
      }
      .part-row:hover {
        background: rgba(255, 255, 255, 0.07);
      }
      .part-av {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--red);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .part-av img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .podium-av {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .podium-av img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* actions */
      .rd-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 0.5rem;
      }

      /* ── RESULTS PODIUM ───────────────────── */
      .podium-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .podium-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        transition: background 0.2s;
      }
      .podium-row.p1 {
        background: rgba(255, 193, 7, 0.08);
        border-color: rgba(255, 193, 7, 0.2);
      }
      .podium-row.p2 {
        background: rgba(176, 196, 222, 0.06);
        border-color: rgba(176, 196, 222, 0.15);
      }
      .podium-row.p3 {
        background: rgba(205, 127, 50, 0.06);
        border-color: rgba(205, 127, 50, 0.15);
      }
      .podium-pos {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-size: 16px;
        flex-shrink: 0;
      }
      .podium-pos.p1 {
        background: rgba(255, 193, 7, 0.2);
        color: #ffc107;
      }
      .podium-pos.p2 {
        background: rgba(176, 196, 222, 0.2);
        color: #b0c4de;
      }
      .podium-pos.p3 {
        background: rgba(205, 127, 50, 0.2);
        color: #cd7f32;
      }
      .podium-pos.other {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text3);
        font-size: 13px;
      }
      .podium-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .podium-pts {
        font-family: var(--font-display);
        font-size: 18px;
        color: var(--yellow, #ffc107);
        white-space: nowrap;
      }
      .podium-pts.zero {
        color: var(--text3);
        font-size: 13px;
        font-family: inherit;
      }

      /* ── ORGANIZER REVIEW ─────────────────── */
      .review-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .review-score {
        display: flex;
        gap: 12px;
      }
      .review-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2, rgba(255, 255, 255, 0.04));
        cursor: pointer;
        transition: all 0.2s;
        font-size: 22px;
      }
      .review-btn:hover {
        transform: translateY(-2px);
      }
      .review-btn.like:hover {
        border-color: var(--green);
        background: rgba(0, 200, 83, 0.1);
      }
      .review-btn.dislike:hover {
        border-color: var(--red);
        background: rgba(225, 6, 0, 0.1);
      }
      .review-btn span {
        font-size: 11px;
        color: var(--text3);
      }

      /* ── SIDEBAR STAT ─────────────────────── */
      .sidebar-stat-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .sidebar-stat-row:last-child {
        border-bottom: none;
      }
      .sidebar-stat-label {
        color: var(--text3);
      }
      .sidebar-stat-val {
        font-weight: 600;
      }

      /* ── SKELETON ─────────────────────────── */
      .rd-hero-skeleton {
        min-height: 420px;
        background: linear-gradient(160deg, #111 0%, #1a0a0c 60%, #0a0a0a 100%);
        display: flex;
        align-items: flex-end;
        padding: 3rem 2rem;
      }
      .rd-hero-skeleton-inner {
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
      }

      /* entry animation */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .anim {
        animation: fadeUp 0.5s ease both;
      }
      .anim-d1 {
        animation-delay: 0.05s;
      }
      .anim-d2 {
        animation-delay: 0.12s;
      }
      .anim-d3 {
        animation-delay: 0.2s;
      }
      .anim-d4 {
        animation-delay: 0.28s;
      }
    </style>
</head>
  <body>
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>
    <header class="site-header" id="site-header"></header>

    <main>
      <!-- HERO (skeleton until loaded) -->
      <div id="race-hero">
        <div class="rd-hero-skeleton">
          <div class="rd-hero-skeleton-inner">
            <div
              class="skeleton"
              style="
                height: 14px;
                width: 100px;
                margin-bottom: 2rem;
                border-radius: 4px;
              "
            ></div>
            <div
              class="skeleton"
              style="
                height: 18px;
                width: 120px;
                margin-bottom: 1rem;
                border-radius: 4px;
              "
            ></div>
            <div
              class="skeleton"
              style="
                height: 80px;
                width: 70%;
                margin-bottom: 1.5rem;
                border-radius: 4px;
              "
            ></div>
            <div
              class="skeleton"
              style="height: 30px; width: 380px; border-radius: 20px"
            ></div>
          </div>
        </div>
      </div>

      <div class="rd-body">
        <div id="race-main">
          <div
            class="skeleton"
            style="height: 180px; border-radius: 14px; margin-bottom: 1.25rem"
          ></div>
          <div
            class="skeleton"
            style="height: 220px; border-radius: 14px"
          ></div>
        </div>
        <div id="race-sidebar">
          <div
            class="skeleton"
            style="height: 260px; border-radius: 14px; margin-bottom: 1.25rem"
          ></div>
        </div>
      </div>
    </main>

    <!-- EDIT RACE MODAL -->
    <div class="modal-overlay" id="modal-edit">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Редактировать гонку</div>
          <button class="modal-close" onclick="closeModal('modal-edit')">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <form id="form-edit" onsubmit="handleEditRace(event)">
            <input type="hidden" name="race_id" id="edit-race-id" />
            <div class="form-group">
              <label class="form-label">Название гонки</label
              ><input class="form-input" type="text" name="name" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Тип трассы</label
                ><input class="form-input" type="text" name="race" required />
              </div>
              <div class="form-group">
                <label class="form-label">Макс. участников</label
                ><input
                  class="form-input"
                  type="number"
                  name="maxuser"
                  min="2"
                  max="100"
                  required
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Дата и время</label
                ><input
                  class="form-input"
                  type="datetime-local"
                  name="time"
                  required
                />
              </div>
              <div class="form-group">
                <label class="form-label">Статус</label>
                <select class="form-input" name="status">
                  <option value="Регистрация">Регистрация</option>
                  <option value="Завершена">Завершена</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Описание</label
              ><textarea class="form-input" rows="3" name="about"></textarea>
            </div>
            <div class="form-error" id="error-edit-race"></div>
            <div style="display: flex; gap: 10px; margin-top: 0.5rem">
              <button type="submit" class="btn btn-red" id="btn-submit-edit">
                Сохранить
              </button>
              <button
                type="button"
                class="btn btn-ghost"
                onclick="closeModal('modal-edit')"
              >
                Отмена
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- SET RESULTS MODAL -->
    <div class="modal-overlay" id="modal-results">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Установить результаты</div>
          <button class="modal-close" onclick="closeModal('modal-results')">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div id="results-form-container"></div>
          <div style="display: flex; gap: 10px; margin-top: 1rem">
            <button class="btn btn-red" onclick="saveResults()">
              Сохранить
            </button>
            <button class="btn btn-ghost" onclick="closeModal('modal-results')">
              Отмена
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/shared.js"></script>
    <script>
      const raceId = parseInt(window.location.pathname.split("/")[2]);
      let race = null;
      let raceParticipants = [];
      let isRegistered = false;
      let profilesMap = {}; // user_id → {avatar_url, nickname, ...}

      async function init() {
        renderHeader("home");
        injectAuthModal();
        injectToast();
        await initAuth();
        await loadRace();
        document.getElementById("loading-overlay").classList.add("hidden");
      }

      async function loadRace() {
        try {
          race = await api.getRace(raceId);
          raceParticipants = await api.getRaceParticipants(raceId);
          isRegistered =
            currentUser &&
            raceParticipants.some((p) => p.user_id === currentUser.id);

          // загружаем профили всех участников параллельно для аватарок и никнеймов
          const profileResults = await Promise.allSettled(
            raceParticipants.map((p) => api.getPublicProfile(p.user_id))
          );
          profilesMap = {};
          raceParticipants.forEach((p, i) => {
            if (profileResults[i].status === "fulfilled") {
              profilesMap[p.user_id] = profileResults[i].value;
            }
          });

          document.title = `${race.name} — F1 Online`;
          await renderRace();
        } catch (e) {
          document.getElementById("race-hero").innerHTML = "";
          document.getElementById(
            "race-main"
          ).innerHTML = `<div class="error-state">Гонка не найдена<br/><a href="/" style="color:var(--red)">← Вернуться</a></div>`;
          document.getElementById("race-sidebar").innerHTML = "";
        }
      }

      async function renderRace() {
        const canEdit =
          currentUser &&
          (currentUser.is_superuser ||
            (currentUser.is_verified && race.created_by === currentUser.id));
        const isParticipant = raceParticipants.some(
          (p) => p.user_id === currentUser?.id
        );

        // ── Hero ──────────────────────────────────────────────
        const statusChipClass =
          race.status === "Регистрация"
            ? "green"
            : race.status === "Завершена"
            ? ""
            : "";
        const statusEmoji =
          race.status === "Регистрация"
            ? "🟢"
            : race.status === "Завершена"
            ? "🏁"
            : "🚫";

        // никнейм организатора из profilesMap или обрезанный email
        const creatorProfile = profilesMap[race.created_by];
        const creatorName =
          creatorProfile?.nickname ||
          (race.creator_email ? race.creator_email.split("@")[0] : "—");

        document.getElementById("race-hero").innerHTML = `
    <div class="rd-hero">
      <div class="rd-hero-bg"></div>
      <div class="rd-hero-marks"></div>
      <div class="rd-hero-content">
        <a href="/" class="rd-back anim">← Назад к гонкам</a>
        <div class="rd-race-type anim anim-d1">${race.race}</div>
        <h1 class="rd-title anim anim-d2">${race.name}</h1>
        <div class="rd-hero-chips anim anim-d3">
          <div class="rd-chip">📅 ${formatDate(race.time)}</div>
          <div class="rd-chip ${statusChipClass}">${statusEmoji} ${
          race.status
        }</div>
          <div class="rd-chip">👥 ${race.users} / ${race.maxuser} мест</div>
          ${creatorName ? `<div class="rd-chip">🎙 ${creatorName}</div>` : ""}
          ${
            race.organizer_likes || race.organizer_dislikes
              ? `<div class="rd-chip yellow">👍 ${
                  race.organizer_likes || 0
                } &nbsp; 👎 ${race.organizer_dislikes || 0}</div>`
              : ""
          }
        </div>
      </div>
    </div>`;

        // ── Main column ───────────────────────────────────────
        const pct = Math.round((race.users / race.maxuser) * 100);
        const fillClass = pct >= 100 ? "full" : pct >= 75 ? "warn" : "";

        // action button
        let actionBtn = "";
        if (race.status === "Регистрация") {
          if (!currentUser)
            actionBtn = `<button class="btn btn-red" onclick="openAuthModal('login')">Войти и участвовать</button>`;
          else if (isRegistered)
            actionBtn = `<button class="btn btn-ghost" onclick="toggleReg()">Отменить участие</button>`;
          else if (race.users < race.maxuser)
            actionBtn = `<button class="btn btn-red" onclick="toggleReg()">Участвовать</button>`;
          else
            actionBtn = `<button class="btn btn-ghost" disabled>Мест нет</button>`;
        }

        const participantsHtml = raceParticipants.length
          ? raceParticipants
              .map((p) => {
                const profile = profilesMap[p.user_id];
                const displayName =
                  profile?.nickname || p.username.split("@")[0];
                const initials = displayName.slice(0, 2).toUpperCase();
                const avHtml = profile?.avatar_url
                  ? `<div class="part-av"><img src="${profile.avatar_url}" alt="${initials}" onerror="this.parentElement.textContent='${initials}'"/></div>`
                  : `<div class="part-av">${initials}</div>`;
                return `<a href="/profile?id=${p.user_id}" class="part-row">
          ${avHtml}
          <span>${displayName}</span>
        </a>`;
              })
              .join("")
          : '<div style="color:var(--text3);font-size:13px;padding:8px 0;">Нет участников</div>';

        document.getElementById("race-main").innerHTML = `
    <!-- Capacity -->
    <div class="rd-card anim anim-d1">
      <div class="rd-card-head"><div class="rd-card-head-icon">📊</div>Заполненность</div>
      <div class="rd-card-body">
        <div class="cap-row">
          <span class="cap-label">Свободных мест</span>
          <span class="cap-num">${
            race.users
          } <span style="color:var(--text3);font-size:14px;font-family:inherit;">/ ${
          race.maxuser
        }</span></span>
        </div>
        <div class="cap-track"><div class="cap-fill ${fillClass}" style="width:${pct}%"></div></div>
      </div>
    </div>

    <!-- About -->
    ${
      race.about
        ? `
    <div class="rd-card anim anim-d2">
      <div class="rd-card-head"><div class="rd-card-head-icon">📋</div>Описание</div>
      <div class="rd-card-body"><p class="rd-about">${race.about}</p></div>
    </div>`
        : ""
    }

    <!-- Participants -->
    <div class="rd-card anim anim-d3">
      <div class="rd-card-head">
        <div class="rd-card-head-icon">👥</div>
        Участники (${raceParticipants.length})
      </div>
      <div class="rd-card-body">
        <div class="part-grid">${participantsHtml}</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="rd-actions anim anim-d4">
      ${actionBtn}
      ${
        canEdit
          ? `<button class="btn btn-ghost" onclick="openEditModal()">✎ Редактировать</button>`
          : ""
      }
      ${
        race.status === "Завершена" && canEdit
          ? `<button class="btn btn-ghost" onclick="openResultsModal()">🏆 Результаты</button>`
          : ""
      }
    </div>`;

        // ── Sidebar ──────────────────────────────────────────
        let sidebarHtml = "";

        // results
        if (race.status === "Завершена") {
          try {
            const results = await api.getRaceResults(raceId);
            if (results.results && results.results.length > 0) {
              // догружаем профили тех, кого нет в profilesMap (исторические результаты)
              const missing = results.results
                .filter((r) => !profilesMap[r.user_id])
                .map((r) => r.user_id);
              if (missing.length) {
                const extra = await Promise.allSettled(
                  missing.map((id) => api.getPublicProfile(id))
                );
                missing.forEach((id, i) => {
                  if (extra[i].status === "fulfilled")
                    profilesMap[id] = extra[i].value;
                });
              }
              const rows = results.results.map((r) => {
  const posLabel = formatPosition(r.position);
  const posClass = r.position > 0 && r.position <= 3 ? `p${r.position}` : "other";
  const rowClass = r.position > 0 && r.position <= 3 ? `p${r.position}` : "";
  const pts = getPoints(r.position);
  const profile = profilesMap[r.user_id];
  const displayName = profile?.nickname || r.username.split("@")[0];
  const initials = displayName.slice(0, 2).toUpperCase();
  const avHtml = profile?.avatar_url
    ? `<div class="podium-av"><img src="${profile.avatar_url}" alt="${initials}" onerror="this.parentElement.textContent='${initials}'"/></div>`
    : `<div class="podium-av">${initials}</div>`;

  return `<div class="podium-row ${rowClass}">
    <div class="podium-pos ${posClass}">${posLabel}</div>
    ${avHtml}
    <div class="podium-name">${displayName}</div>
    <div class="podium-pts ${pts >= 0 ? "" : "zero"}">${pts > 0 ? `+${pts}` : pts < 0 ? pts : "—"}</div>
  </div>`;
}).join("");
              sidebarHtml += `
          <div class="rd-card anim">
            <div class="rd-card-head"><div class="rd-card-head-icon">🏆</div>Результаты</div>
            <div class="rd-card-body"><div class="podium-wrap">${rows}</div></div>
          </div>`;
            }
          } catch (e) {}
        }

        // organizer review
        if (
          race.status === "Завершена" &&
          currentUser &&
          isParticipant &&
          race.created_by !== currentUser.id
        ) {
          sidebarHtml += `
      <div class="rd-card anim anim-d1">
        <div class="rd-card-head"><div class="rd-card-head-icon">⭐</div>Оценить организатора</div>
        <div class="rd-card-body">
          <div class="review-section">
            <div class="review-score">
              <button class="review-btn like" onclick="submitReview(1)">👍<span>Лайк</span></button>
              <button class="review-btn dislike" onclick="submitReview(-1)">👎<span>Дизлайк</span></button>
            </div>
            <button class="btn btn-ghost" onclick="removeReview()" id="btn-remove-review" style="display:none;font-size:12px;">Убрать оценку</button>
            <div class="form-error" id="review-error" style="margin-top:.25rem;"></div>
          </div>
        </div>
      </div>`;
        }

        // organizer stats card
        sidebarHtml += `
    <div class="rd-card anim anim-d2">
      <div class="rd-card-head"><div class="rd-card-head-icon">🎙</div>Организатор</div>
      <div class="rd-card-body" style="padding-top:.75rem;padding-bottom:.75rem;">
        <div class="sidebar-stat-row">
          <span class="sidebar-stat-label">Пилот</span>
          <span class="sidebar-stat-val">${creatorName}</span>
        </div>
        <div class="sidebar-stat-row">
          <span class="sidebar-stat-label">👍 Лайки</span>
          <span class="sidebar-stat-val" style="color:var(--green);">${
            race.organizer_likes || 0
          }</span>
        </div>
        <div class="sidebar-stat-row">
          <span class="sidebar-stat-label">👎 Дизлайки</span>
          <span class="sidebar-stat-val" style="color:var(--red);">${
            race.organizer_dislikes || 0
          }</span>
        </div>
      </div>
    </div>`;

        document.getElementById("race-sidebar").innerHTML = sidebarHtml;
      }

      async function toggleReg() {
        try {
          if (isRegistered) {
            await api.unregisterFromRace(raceId);
            showToast("Регистрация отменена");
          } else {
            await api.registerForRace(raceId);
            showToast("Вы зарегистрированы!");
          }
          await loadRace();
        } catch (e) {
          showToast(e.message, true);
        }
      }

      async function submitReview(vote) {
        try {
          await api.submitReview(raceId, vote);
          showToast(
            vote === 1 ? "👍 Лайк поставлен!" : "👎 Дизлайк поставлен!"
          );
          const btn = document.getElementById("btn-remove-review");
          if (btn) btn.style.display = "";
          await loadRace();
        } catch (e) {
          const el = document.getElementById("review-error");
          if (el) {
            el.textContent = e.message;
            el.classList.add("visible");
          }
        }
      }

      async function removeReview() {
        try {
          await api.deleteReview(raceId);
          showToast("Оценка удалена");
          await loadRace();
        } catch (e) {
          showToast(e.message, true);
        }
      }

      async function openEditModal() {
        const form = document.getElementById("form-edit");
        document.getElementById("edit-race-id").value = race.id;
        form.name.value = race.name;
        form.race.value = race.race;
        form.maxuser.value = race.maxuser;
        form.about.value = race.about || "";
        form.status.value = race.status;
        const d = new Date(race.time);
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        form.time.value = d.toISOString().slice(0, 16);
        openModal("modal-edit");
      }

      async function handleEditRace(e) {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById("btn-submit-edit");
        btn.disabled = true;
        try {
          await api.updateRace(race.id, {
            name: form.name.value,
            race: form.race.value,
            about: form.about.value,
            time: form.time.value,
            maxuser: parseInt(form.maxuser.value),
            status: form.status.value,
          });
          closeModal("modal-edit");
          showToast("Гонка обновлена!");
          await loadRace();
        } catch (e) {
          const el = document.getElementById("error-edit-race");
          el.textContent = e.message;
          el.classList.add("visible");
        } finally {
          btn.disabled = false;
        }
      }

      async function openResultsModal() {
        const p = await api.getRaceParticipants(raceId);
        document.getElementById("results-form-container").innerHTML = !p.length
          ? '<p style="color:var(--text3);text-align:center;padding:2rem;">Нет участников</p>'
          : '<div style="display:flex;flex-direction:column;gap:10px;">' +
            p
              .map((x) => {
                const profile = profilesMap[x.user_id];
                const displayName =
                  profile?.nickname || x.username.split("@")[0];
                return `<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">
          <div style="flex:1;font-size:14px;">${displayName}</div>
          <select class="form-input" style="width:100px;" data-user-id="${
            x.user_id
          }">
  <option value="">—</option>
  ${Array.from({length:20},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}
<option value="21">DNS</option>
<option value="22">DSK</option>
</select>
        </div>`;
              })
              .join("") +
            "</div>";
        openModal("modal-results");
      }

      async function saveResults() {
        const inputs = document.querySelectorAll(
          "#results-form-container select[data-user-id]"
        );
        const results = [];
        const positions = new Set();
        for (const input of inputs) {
          const userId = parseInt(input.dataset.userId);
          const position = input.value !== "" ? parseInt(input.value) : null;
          if (position !== null && !isNaN(position)) {
            if (positions.has(position)) {
              showToast("Позиции должны быть уникальными", true);
              return;
            }
            positions.add(position);
            results.push({ user_id: userId, position });
          }
        }
        if (!results.length) {
          showToast("Укажите хотя бы один результат", true);
          return;
        }
        try {
          await api.setRaceResults(raceId, results);
          closeModal("modal-results");
          showToast("Результаты сохранены!");
          await loadRace();
        } catch (e) {
          showToast(e.message, true);
        }
      }

      function onLoginSuccess() {
        loadRace();
      }

      init();
    </script>
  </body>
</html>
