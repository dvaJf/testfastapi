<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Новости — F1 Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
<header class="site-header" id="site-header"></header>

<main>
  <section class="news-hero">
    <h1>Новости<br/><span>F1 Online</span></h1>
  </section>

  <!-- ADMIN PANEL -->
  <section class="news-admin-panel" id="news-admin-panel">
    <div class="section-header"><span class="section-title">Управление новостями</span></div>
    <div class="admin-grid" style="grid-template-columns:repeat(2,1fr);">
      <div class="admin-stat"><div class="admin-stat-label">Всего новостей</div><div class="admin-stat-val" id="news-stat-total">—</div></div>
      <div class="admin-stat"><div class="admin-stat-label">Последняя</div><div class="admin-stat-val red" id="news-stat-latest">—</div></div>
    </div>
    <div class="admin-actions">
      <button class="btn btn-red" onclick="openCreateNewsModal()">+ Создать новость</button>
    </div>
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Заголовок</th><th>Дата</th><th>Действия</th></tr></thead>
        <tbody id="admin-news-tbody"><tr><td colspan="4" style="text-align:center;color:var(--text3)">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </section>

  <!-- NEWS GRID -->
  <section class="news-section">
    <div class="section-header">
      <span class="section-title">Новости</span>
      <span class="section-count" id="news-count">Загрузка...</span>
    </div>
    <div class="news-grid" id="news-grid">
      <div class="skeleton" style="height:300px;border-radius:12px;"></div>
    </div>
  </section>
</main>

<!-- CREATE NEWS MODAL -->
<div class="modal-overlay" id="modal-create-news">
  <div class="modal wide">
    <div class="modal-header">
      <div class="modal-title">Создать новость</div>
      <button class="modal-close" onclick="closeModal('modal-create-news')">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-create-news" onsubmit="handleCreateNews(event)">
        <div class="form-group"><label class="form-label">Заголовок</label><input class="form-input" type="text" name="title" placeholder="Заголовок новости" required/></div>
        <div class="form-group"><label class="form-label">Краткое описание</label><input class="form-input" type="text" name="summary" placeholder="Краткое описание для карточки"/></div>
        <div class="form-group"><label class="form-label">URL изображения (опционально)</label><input class="form-input" type="url" name="image_url" placeholder="https://example.com/image.jpg"/></div>
        <div class="form-group"><label class="form-label">Полный текст</label><textarea class="form-input" rows="8" name="content" placeholder="Полный текст новости..." required></textarea></div>
        <div class="form-error" id="error-create-news"></div>
        <div style="display:flex;gap:10px;margin-top:.5rem">
          <button type="submit" class="btn btn-red" id="btn-submit-create-news">Создать</button>
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-create-news')">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- EDIT NEWS MODAL -->
<div class="modal-overlay" id="modal-edit-news">
  <div class="modal wide">
    <div class="modal-header">
      <div class="modal-title">Редактировать новость</div>
      <button class="modal-close" onclick="closeModal('modal-edit-news')">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-edit-news" onsubmit="handleEditNews(event)">
        <input type="hidden" name="news_id" id="edit-news-id"/>
        <div class="form-group"><label class="form-label">Заголовок</label><input class="form-input" type="text" name="title" required/></div>
        <div class="form-group"><label class="form-label">Краткое описание</label><input class="form-input" type="text" name="summary"/></div>
        <div class="form-group"><label class="form-label">URL изображения</label><input class="form-input" type="url" name="image_url"/></div>
        <div class="form-group"><label class="form-label">Полный текст</label><textarea class="form-input" rows="8" name="content" required></textarea></div>
        <div class="form-error" id="error-edit-news"></div>
        <div style="display:flex;gap:10px;margin-top:.5rem">
          <button type="submit" class="btn btn-red" id="btn-submit-edit-news">Сохранить</button>
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-edit-news')">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/static/js/shared.js"></script>
<script>
let newsList = [];
let editingNews = null;

async function init() {
  renderHeader('news');
  injectAuthModal();
  injectToast();
  await initAuth();
  await loadNews();
  document.getElementById("loading-overlay").classList.add("hidden");
}

async function loadNews() {
  try {
    newsList = await api.getNews();
    renderNews();
    renderAdminPanel();
  } catch (e) { showToast(e.message, true); }
}

function renderNews() {
  const grid = document.getElementById("news-grid");
  document.getElementById("news-count").textContent = `${newsList.length} ${pluralize(newsList.length, "новость", "новости", "новостей")}`;
  if (!newsList.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📰</div><p>Пока нет новостей</p></div>'; return; }
  const isAdmin = currentUser?.is_superuser;
  grid.innerHTML = newsList.map(n => `
    <a href="/news/${n.id}" class="news-card" style="text-decoration:none;">
      <div class="news-card-image">
        ${n.image_url ? `<img src="${n.image_url}" alt="${n.title}" onerror="this.parentElement.innerHTML='<div class=\\'news-card-image-placeholder\\'>📰</div>'">` : '<div class="news-card-image-placeholder">📰</div>'}
      </div>
      <div class="news-card-content">
        <div class="news-card-date">📅 ${formatDate(n.created_at)}</div>
        <h3 class="news-card-title">${n.title}</h3>
        <p class="news-card-summary">${n.summary || n.content.substring(0, 150)}...</p>
      </div>
      ${isAdmin ? `
      <div class="news-card-actions" onclick="event.preventDefault();event.stopPropagation();">
        <button class="edit" onclick="openEditNewsModal(${n.id})">✎ Редактировать</button>
        <button onclick="deleteNews(${n.id})" style="">🗑 Удалить</button>
      </div>` : ""}
    </a>`).join('');
}

function renderAdminPanel() {
  const panel = document.getElementById("news-admin-panel");
  if (!currentUser?.is_superuser) { panel.classList.remove("visible"); return; }
  panel.classList.add("visible");
  document.getElementById("news-stat-total").textContent = newsList.length;
  document.getElementById("news-stat-latest").textContent = newsList.length ? formatDate(newsList[0].created_at).split(',')[0] : '—';
  const tbody = document.getElementById("admin-news-tbody");
  if (!newsList.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text3);">Нет новостей</td></tr>'; return; }
  tbody.innerHTML = newsList.map(n => `
    <tr>
      <td>${n.id}</td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${n.title}">${n.title}</td>
      <td>${formatDate(n.created_at)}</td>
      <td><div class="admin-actions-cell">
        <button class="admin-btn edit" onclick="openEditNewsModal(${n.id})">Редактировать</button>
        <button class="admin-btn" onclick="deleteNews(${n.id})">Удалить</button>
      </div></td>
    </tr>`).join('');
}

function openCreateNewsModal() {
  document.getElementById("form-create-news").reset();
  openModal("modal-create-news");
}

async function openEditNewsModal(newsId) {
  try {
    const news = await api.getNewsItem(newsId);
    editingNews = news;
    document.getElementById("edit-news-id").value = news.id;
    const form = document.getElementById("form-edit-news");
    form.title.value = news.title; form.summary.value = news.summary || "";
    form.content.value = news.content; form.image_url.value = news.image_url || "";
    openModal("modal-edit-news");
  } catch (e) { showToast(e.message, true); }
}

async function handleCreateNews(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById("btn-submit-create-news");
  btn.disabled = true;
  try {
    await api.createNews({ title: form.title.value, summary: form.summary.value, content: form.content.value, image_url: form.image_url.value || null });
    closeModal("modal-create-news"); showToast("Новость создана!"); await loadNews(); form.reset();
  } catch (e) { const el = document.getElementById("error-create-news"); el.textContent = e.message; el.classList.add("visible"); }
  finally { btn.disabled = false; }
}

async function handleEditNews(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById("btn-submit-edit-news");
  btn.disabled = true;
  try {
    await api.updateNews(editingNews.id, { title: form.title.value, summary: form.summary.value, content: form.content.value, image_url: form.image_url.value || null });
    closeModal("modal-edit-news"); showToast("Новость обновлена!"); await loadNews();
  } catch (e) { const el = document.getElementById("error-edit-news"); el.textContent = e.message; el.classList.add("visible"); }
  finally { btn.disabled = false; }
}

async function deleteNews(newsId) {
  if (!confirm("Удалить эту новость?")) return;
  try { await api.deleteNews(newsId); showToast("Новость удалена"); await loadNews(); }
  catch (e) { showToast(e.message, true); }
}

function onLoginSuccess() { renderNews(); renderAdminPanel(); }

init();
</script>
</body>
</html>
