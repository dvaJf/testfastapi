<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Новость — F1 Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <style>
    /* ── HERO IMAGE ──────────────────────── */
    .na-hero {
      position: relative;
      width: 100%;
      height: clamp(280px, 45vw, 520px);
      overflow: hidden;
      background: #0d0d10;
    }
    .na-hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 8s ease;
    }
    .na-hero:hover .na-hero-img { transform: scale(1.04); }
    .na-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.1) 0%,
        rgba(0,0,0,.3) 50%,
        rgba(0,0,0,.82) 100%
      );
    }
    .na-hero-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(-55deg, transparent, transparent 28px, rgba(225,6,0,.04) 28px, rgba(225,6,0,.04) 29px),
        linear-gradient(160deg, #0e0e12 0%, #18080a 60%, #0a0a0a 100%);
      font-size: 80px;
      opacity: .25;
    }
    .na-hero-badge {
      position: absolute;
      top: 1.5rem;
      left: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 3px;
    }
    /* bottom-left title block on hero */
    .na-hero-title-block {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem;
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
    }
    .na-hero-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 62px);
      letter-spacing: 2px;
      line-height: .95;
      text-shadow: 0 4px 32px rgba(0,0,0,.7);
      flex: 1;
    }
    .na-hero-date {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      white-space: nowrap;
      align-self: flex-end;
      padding-bottom: .25rem;
    }

    /* ── BODY LAYOUT ──────────────────────── */
    .na-body {
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }
    .na-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text3);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      transition: color .2s;
    }
    .na-back:hover { color: var(--text); }

    /* summary block */
    .na-summary {
      position: relative;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border-radius: 10px;
      border-left: 3px solid var(--red);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.7;
      color: var(--text2);
      margin-bottom: 2.5rem;
    }
    .na-summary::before {
      content: '"';
      position: absolute;
      top: -10px;
      left: 14px;
      font-family: var(--font-display);
      font-size: 60px;
      color: var(--red);
      opacity: .3;
      line-height: 1;
    }

    /* article text */
    .na-content {
      font-size: 15px;
      line-height: 1.95;
      color: var(--text2);
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .na-content p { margin-bottom: 1.25rem; }

    /* divider */
    .na-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--red) 0%, transparent 60%);
      margin: 2.5rem 0;
      opacity: .4;
    }

    /* footer actions */
    .na-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* share / meta strip */
    .na-meta-strip {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .na-meta-strip-item {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── READING PROGRESS ─────────────────── */
    .na-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--red);
      width: 0%;
      transition: width .1s linear;
      z-index: 9999;
    }

    /* ── ENTRY ANIMATION ─────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: fadeIn .5s ease both; }
    .anim-d1 { animation-delay: .08s; }
    .anim-d2 { animation-delay: .16s; }
    .anim-d3 { animation-delay: .24s; }
    .anim-d4 { animation-delay: .32s; }

    /* ── SKELETON STATE ─────────────────── */
    .na-skel-hero {
      width: 100%;
      height: clamp(280px, 45vw, 520px);
      background: linear-gradient(160deg, #111 0%, #1a0a0c 60%, #0a0a0a 100%);
    }
  </style>
</head>
<body>
<div class="na-progress" id="na-progress"></div>
<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
<header class="site-header" id="site-header"></header>

<main>
  <!-- Hero -->
  <div id="article-hero"><div class="na-skel-hero"></div></div>

  <!-- Body -->
  <div class="na-body">
    <div id="article-body">
      <div class="skeleton" style="height:14px;width:120px;margin-bottom:2rem;border-radius:4px;"></div>
      <div class="skeleton" style="height:80px;margin-bottom:1.5rem;border-radius:8px;"></div>
      <div class="skeleton" style="height:200px;border-radius:8px;"></div>
    </div>
  </div>
</main>

<!-- EDIT NEWS MODAL (admin) -->
<div class="modal-overlay" id="modal-edit-news">
  <div class="modal wide">
    <div class="modal-header">
      <div class="modal-title">Редактировать новость</div>
      <button class="modal-close" onclick="closeModal('modal-edit-news')">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-edit-news" onsubmit="handleEditNews(event)">
        <div class="form-group"><label class="form-label">Заголовок</label><input class="form-input" type="text" name="title" required/></div>
        <div class="form-group"><label class="form-label">Краткое описание</label><input class="form-input" type="text" name="summary"/></div>
        <div class="form-group"><label class="form-label">URL изображения</label><input class="form-input" type="url" name="image_url"/></div>
        <div class="form-group"><label class="form-label">Полный текст</label><textarea class="form-input" rows="8" name="content" required></textarea></div>
        <div class="form-error" id="error-edit-news"></div>
        <div style="display:flex;gap:10px;margin-top:.5rem">
          <button type="submit" class="btn btn-red" id="btn-submit-edit-news">Сохранить</button>
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-edit-news')">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/static/js/shared.js"></script>
<script>
const newsId = parseInt(window.location.pathname.split('/')[2]);
let newsItem = null;

async function init() {
  renderHeader('news');
  injectAuthModal();
  injectToast();
  await initAuth();
  await loadNews();
  document.getElementById("loading-overlay").classList.add("hidden");
  initReadingProgress();
}

function initReadingProgress() {
  const bar = document.getElementById("na-progress");
  window.addEventListener('scroll', () => {
    const scrolled = window.scrollY;
    const total = document.body.scrollHeight - window.innerHeight;
    bar.style.width = total > 0 ? `${(scrolled / total) * 100}%` : '0%';
  }, { passive: true });
}

async function loadNews() {
  try {
    newsItem = await api.getNewsItem(newsId);
    document.title = `${newsItem.title} — F1 Online`;
    renderArticle();
  } catch (e) {
    document.getElementById("article-hero").innerHTML = '';
    document.getElementById("article-body").innerHTML = `
      <div class="error-state">
        Новость не найдена<br/>
        <a href="/news" style="color:var(--red)">← Вернуться к новостям</a>
      </div>`;
  }
}

function renderArticle() {
  const isAdmin = currentUser?.is_superuser;
  const wordCount = newsItem.content.split(/\s+/).length;
  const readTime = Math.max(1, Math.round(wordCount / 200));

  // ── Hero ──────────────────────────────────────────────
  if (newsItem.image_url) {
    document.getElementById("article-hero").innerHTML = `
      <div class="na-hero">
        <img class="na-hero-img" src="${newsItem.image_url}" alt="${newsItem.title}"
             onerror="this.closest('.na-hero').querySelector('.na-hero-overlay').style.display='none';
                      this.replaceWith(Object.assign(document.createElement('div'),{className:'na-hero-placeholder',innerHTML:'📰'}))"/>
        <div class="na-hero-overlay"></div>
        <div class="na-hero-badge">F1 Online</div>
        <div class="na-hero-title-block">
          <h1 class="na-hero-title">${newsItem.title}</h1>
          <div class="na-hero-date">${formatDate(newsItem.created_at).split(',')[0]}</div>
        </div>
      </div>`;
  } else {
    document.getElementById("article-hero").innerHTML = `
      <div class="na-hero">
        <div class="na-hero-placeholder">📰</div>
        <div class="na-hero-overlay" style="background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.75) 100%)"></div>
        <div class="na-hero-badge">F1 Online</div>
        <div class="na-hero-title-block">
          <h1 class="na-hero-title">${newsItem.title}</h1>
          <div class="na-hero-date">${formatDate(newsItem.created_at).split(',')[0]}</div>
        </div>
      </div>`;
  }

  // ── Body ──────────────────────────────────────────────
  document.getElementById("article-body").innerHTML = `
    <a href="/news" class="na-back anim">← Все новости</a>

    <!-- Meta strip -->
    <div class="na-meta-strip anim anim-d1">
      <div class="na-meta-strip-item">📅 ${formatDate(newsItem.created_at)}</div>
    </div>

    <!-- Summary -->
    ${newsItem.summary ? `<div class="na-summary anim anim-d2">${newsItem.summary}</div>` : ''}

    <!-- Content -->
    <div class="na-content anim anim-d3">${newsItem.content}</div>

    <div class="na-divider"></div>

    <!-- Footer actions -->
    <div class="na-footer anim anim-d4">
      <a href="/news" class="btn btn-ghost" style="text-decoration:none;">← Все новости</a>
      ${isAdmin ? `
        <button class="btn btn-green" onclick="openEditModal()">✎ Редактировать</button>
        <button class="btn btn-red" onclick="deleteThisNews()">🗑 Удалить</button>
      ` : ''}
    </div>`;
}

function openEditModal() {
  const form = document.getElementById("form-edit-news");
  form.title.value = newsItem.title;
  form.summary.value = newsItem.summary || '';
  form.content.value = newsItem.content;
  form.image_url.value = newsItem.image_url || '';
  openModal("modal-edit-news");
}

async function handleEditNews(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById("btn-submit-edit-news");
  btn.disabled = true;
  try {
    await api.updateNews(newsItem.id, {
      title: form.title.value,
      summary: form.summary.value,
      content: form.content.value,
      image_url: form.image_url.value || null
    });
    closeModal("modal-edit-news"); showToast("Новость обновлена!"); await loadNews();
  } catch (e) {
    const el = document.getElementById("error-edit-news"); el.textContent = e.message; el.classList.add("visible");
  } finally { btn.disabled = false; }
}

async function deleteThisNews() {
  if (!confirm("Удалить эту новость?")) return;
  try {
    await api.deleteNews(newsItem.id);
    showToast("Новость удалена");
    setTimeout(() => window.location.href = "/news", 800);
  } catch (e) { showToast(e.message, true); }
}

init();
</script>
</body>
</html>
