<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Online — Ставки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/main.css" />
    <style>
        .bets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .bet-card {
            background: var(--surface);
            padding: 1.5rem;
            cursor: pointer;
            transition: background .15s;
            position: relative;
            overflow: hidden;
        }
        .bet-card:hover { background: var(--surface2); }
        .bet-card::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: transparent;
            transition: background .15s;
        }
        .bet-card:hover::before { background: var(--red); }
        .bet-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .bet-type { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
        .bet-status { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 3px; }
        .bet-status.open { background: rgba(0,200,83,.12); color: var(--green); }
        .bet-status.closed { background: rgba(255,193,7,.12); color: var(--yellow); }
        .bet-status.resolved { background: rgba(255,255,255,.06); color: var(--text3); }
        .bet-card h3 { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; margin-bottom: .5rem; color: var(--text); }
        .bet-card-desc { font-size: 12px; color: var(--text3); margin-bottom: 1rem; line-height: 1.5; }
        .bet-options { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
        .bet-option-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .bet-card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text3);
            flex-wrap: wrap;
        }
        .bet-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 1rem;
        }
        .pool-amount {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--yellow);
        }
        .register-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s;
        }
        .register-btn:hover { opacity: .85; }
        /* Admin table */
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); border-bottom: 1px solid var(--border); }
        .admin-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
        .admin-table tr:hover td { background: rgba(255,255,255,.02); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        /* Bet detail modal */
        .bet-options-list { display: flex; flex-direction: column; gap: 8px; margin: 1rem 0; }
        .bet-option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s;
        }
        .bet-option-item:hover { border-color: var(--red); background: var(--surface3); }
        .bet-option-item.selected { border-color: var(--red); background: rgba(225,6,0,.08); }
        .bet-option-radio {
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; flex-shrink: 0;
        }
        .bet-option-item.selected .bet-option-radio {
            border-color: var(--red);
            background: var(--red);
        }
        .bet-option-label { flex: 1; font-size: 14px; }
        .bet-option-pool { font-size: 12px; color: var(--text3); }
        .stake-input { width: 100%; }
        .user-score-display {
            font-size: 12px; color: var(--text3);
            margin-bottom: 1rem; padding: 8px 12px;
            background: var(--surface2); border-radius: 6px;
        }
        .user-score-display span { color: var(--yellow); font-weight: 600; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-chip {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            transition: all .15s;
        }
        .filter-chip:hover { border-color: var(--red); }
        .filter-chip.active { background: var(--red); color: white; border-color: var(--red); }
        .admin-actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }
        .edit-option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .edit-option-row .form-input { flex: 1; }
        .edit-option-row .btn-sm { padding: 4px 8px; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
    <header class="site-header" id="site-header"></header>

    <main>
        <section class="hero">
            <h1>Ставки<br/><span>Твой риск</span></h1>
            <p class="hero-sub">Делай ставки на события и выигрывай очки</p>
        </section>

        <section class="admin-panel" id="admin-panel" style="display:none;">
            <div class="section-header">
                <span class="section-title">Панель управления ставками</span>
            </div>
            <div style="overflow-x: auto">
                <table class="admin-table" id="admin-bets-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Статус</th>
                            <th>Закрытие</th>
                            <th>Пул</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="admin-bets-tbody">
                        <tr><td colspan="6" style="text-align: center; color: var(--text3)">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-chip" data-filter="all" onclick="setFilter('all', this)">Все ставки</button>
            <button class="filter-chip active" data-filter="открыта" onclick="setFilter('открыта', this)">Открытые</button>
            <button class="filter-chip" data-filter="закрыта" onclick="setFilter('закрыта', this)">Закрытые</button>
            <button class="filter-chip" data-filter="завершена" onclick="setFilter('завершена', this)">Завершенные</button>
        </div>

        <section class="races-section">
            <div class="section-header">
                <span class="section-title">Ставки</span>
                <button class="nav-btn primary" id="btn-create-bet" style="display:none;" onclick="openCreateBetModal()">+ Создать ставку</button>
            </div>
            <div class="bets-grid" id="bets-grid">
                <div class="empty-state"><div class="skeleton" style="height: 200px"></div></div>
            </div>
        </section>
    </main>

    <!-- Create Bet Modal -->
    <div class="modal-overlay" id="modal-create-bet">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Создать событие для ставок</div>
                <button class="modal-close" onclick="closeModal('modal-create-bet')">✕</button>
            </div>
            <div class="modal-body">
                <form id="form-create-bet" onsubmit="handleCreateBet(event)">
                    <div class="form-group">
                        <label class="form-label">Название события</label>
                        <input class="form-input" type="text" name="title" placeholder="Победитель Гран-при..." required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Описание</label>
                        <textarea class="form-input" rows="3" name="description" placeholder="Опишите событие..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Время закрытия ставок</label>
                        <input class="form-input" type="datetime-local" name="closes_at" id="create-closes-at" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Варианты (минимум 2)</label>
                        <div id="create-options-container"></div>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="addCreateOptionRow()" style="margin-top:8px;">+ Добавить вариант</button>
                    </div>
                    <div class="form-error" id="error-create-bet"></div>
                    <div style="display: flex; gap: 10px; margin-top: 1rem">
                        <button type="submit" class="btn btn-red" id="btn-submit-create-bet">Создать</button>
                        <button type="button" class="btn btn-ghost" onclick="closeModal('modal-create-bet')">Отмена</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Place Bet Modal -->
    <div class="modal-overlay" id="modal-place-bet">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="bet-modal-title">Сделать ставку</div>
                <button class="modal-close" onclick="closeModal('modal-place-bet')">✕</button>
            </div>
            <div class="modal-body">
                <div class="user-score-display" id="user-score-display"></div>
                <div id="bet-options-container"></div>
                <div class="form-group" style="margin-top:1rem;">
                    <label class="form-label">Сумма ставки (очки)</label>
                    <input class="form-input stake-input" type="number" id="bet-stake" min="1" placeholder="Введите количество очков" required />
                    <div class="form-error" id="error-bet-stake"></div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 1rem">
                    <button class="btn btn-red" onclick="submitBet()">Поставить</button>
                    <button class="btn btn-ghost" onclick="closeModal('modal-place-bet')">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Resolve Bet Modal (Admin) -->
    <div class="modal-overlay" id="modal-resolve-bet">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Завершить ставку</div>
                <button class="modal-close" onclick="closeModal('modal-resolve-bet')">✕</button>
            </div>
            <div class="modal-body">
                <p style="font-size:13px;color:var(--text3);margin-bottom:1rem;">Выберите выигрышный вариант:</p>
                <div id="resolve-options-container"></div>
                <div style="display: flex; gap: 10px; margin-top: 1rem">
                    <button class="btn btn-red" onclick="submitResolve()">Завершить и распределить</button>
                    <button class="btn btn-ghost" onclick="closeModal('modal-resolve-bet')">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Bet Modal -->
    <div class="modal-overlay" id="modal-edit-bet">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Редактировать ставку</div>
                <button class="modal-close" onclick="closeModal('modal-edit-bet')">✕</button>
            </div>
            <div class="modal-body">
                <form id="form-edit-bet" onsubmit="handleEditBet(event)">
                    <input type="hidden" id="edit-bet-id" />
                    <div class="form-group">
                        <label class="form-label">Название события</label>
                        <input class="form-input" type="text" name="title" id="edit-bet-title" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Описание</label>
                        <textarea class="form-input" rows="3" name="description" id="edit-bet-description"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Время закрытия ставок</label>
                        <input class="form-input" type="datetime-local" name="closes_at" id="edit-bet-closes-at" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Статус</label>
                        <select class="form-input" name="status" id="edit-bet-status">
                            <option value="открыта">Открыта</option>
                            <option value="закрыта">Закрыта</option>
                            <option value="завершена">Завершена</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Варианты ответа</label>
                        <div id="edit-options-container"></div>
                        <button type="button" class="btn btn-ghost btn-sm" onclick="addEditOptionRow()" style="margin-top:8px;">+ Добавить вариант</button>
                    </div>
                    <div class="form-error" id="error-edit-bet"></div>
                    <div style="display: flex; gap: 10px; margin-top: 1rem">
                        <button type="submit" class="btn btn-red" id="btn-submit-edit-bet">Сохранить</button>
                        <button type="button" class="btn btn-ghost" onclick="closeModal('modal-edit-bet')">Отмена</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/shared.js"></script>
    <script src="/static/js/bets.js"></script>
</body>
</html>
